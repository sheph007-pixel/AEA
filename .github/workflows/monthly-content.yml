name: Monthly Employer Briefings

on:
  schedule:
    # Run on the 1st of each month at 8:00 AM UTC
    - cron: '0 8 1 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-briefings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate monthly briefings
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ChatGPT: ${{ secrets.ChatGPT }}
        run: node scripts/generate-monthly-briefings.js

      - name: Fact-check briefings
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ChatGPT: ${{ secrets.ChatGPT }}
        run: node scripts/fact-check.js src/content/briefings

      - name: Commit and push
        run: |
          git config user.name "AEA Content Bot"
          git config user.email "content-bot@americanemployers.org"
          git add src/content/
          if git diff --staged --quiet; then
            echo "No new briefings to commit"
          else
            git commit -m "Monthly employer briefings: $(date +%B\ %Y) [fact-checked]"
            git push origin main
          fi
