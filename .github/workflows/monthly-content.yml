name: Monthly Employer Briefings

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-briefings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure content directories
        run: mkdir -p src/content/briefings

      - name: Generate monthly briefings
        env:
          OPENAI_API_KEY: ${{ secrets.ChatGPT }}
        run: node scripts/generate-monthly-briefings.js

      - name: Fact-check briefings
        env:
          OPENAI_API_KEY: ${{ secrets.ChatGPT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/fact-check.js src/content/briefings
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "AEA Content Bot"
          git config user.email "content-bot@americanemployers.org"
          git add src/content/
          if git diff --staged --quiet; then
            echo "No new briefings to commit"
          else
            git commit -m "Monthly employer briefings: $(date +%B\ %Y) [verified]"
            git push origin main
          fi
