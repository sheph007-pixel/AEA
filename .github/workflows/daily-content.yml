name: Daily Content Generation

on:
  schedule:
    # Run daily at 6:00 AM UTC (1:00 AM EST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate daily news articles
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ChatGPT: ${{ secrets.ChatGPT }}
        run: node scripts/generate-news.js

      - name: Generate resource article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            node scripts/generate-article.js
          else
            echo "ANTHROPIC_API_KEY not set, skipping resource generation"
          fi

      - name: Fact-check new content
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ChatGPT: ${{ secrets.ChatGPT }}
        run: node scripts/fact-check.js src/content/news

      - name: Commit and push
        run: |
          git config user.name "AEA Content Bot"
          git config user.email "content-bot@americanemployers.org"
          git add src/content/
          if git diff --staged --quiet; then
            echo "No new content to commit"
          else
            git commit -m "Daily content update: $(date +%Y-%m-%d) [fact-checked]"
            git push origin main
          fi
