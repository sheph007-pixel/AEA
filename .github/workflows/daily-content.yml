name: Daily Content Generation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure content directories
        run: |
          mkdir -p src/content/news
          mkdir -p src/content/resources

      - name: Generate daily news articles
        env:
          OPENAI_API_KEY: ${{ secrets.ChatGPT }}
        run: node scripts/generate-news.js

      - name: Fact-check news
        env:
          OPENAI_API_KEY: ${{ secrets.ChatGPT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/fact-check.js src/content/news
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "AEA Content Bot"
          git config user.email "content-bot@americanemployers.org"
          git add src/content/
          if git diff --staged --quiet; then
            echo "No new content to commit"
          else
            git commit -m "Daily content update: $(date +%Y-%m-%d) [verified]"
            git push origin main
          fi
