name: Daily Content Generation

on:
  schedule:
    # Run daily at 6:00 AM UTC (1:00 AM EST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate new article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.js

      - name: Commit and push
        run: |
          git config user.name "AEA Content Bot"
          git config user.email "content-bot@americanemployers.org"
          git add src/content/resources/
          if git diff --staged --quiet; then
            echo "No new content to commit"
          else
            git commit -m "Add daily article: $(date +%Y-%m-%d)"
            git push origin main
          fi
